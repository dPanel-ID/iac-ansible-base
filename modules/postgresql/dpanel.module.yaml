version: 1
kind: dpanel-module

name: postgresql
title: PostgreSQL
description: Install and configure PostgreSQL.
category: database
platforms:
  - vm
icon: postgresql

source:
  backend: ansible
  roles:
    - ANXS.postgresql
  defaults:
    - ansible/roles/ANXS.postgresql/defaults/main.yml

supported_os:
  ubuntu:
    - "22.04"
    - "24.04"
  debian:
    - "12"

actions:
  install:
    title: Install PostgreSQL
    playbook: playbooks/modules/postgresql.install.yml
    confirm: true
    risk: normal

inputs:
  - name: version
    label: PostgreSQL Version
    description: PostgreSQL major version to install.
    type: select
    required: true
    default: "16"
    options:
      - "14"
      - "15"
      - "16"
      - "17"
    maps_to: postgresql_version
    scope: hostgroup

  - name: listen_addresses
    label: Listen Addresses
    description: Network addresses PostgreSQL should bind to.
    type: string_list
    required: false
    default:
      - localhost
    maps_to: postgresql_listen_addresses
    scope: host

  - name: admin_password_secret_ref
    label: Admin Password Secret
    description: dPanel secret reference containing the PostgreSQL admin password.
    type: secret_ref
    required: false
    sensitive: true
    maps_to: postgresql_admin_password
    scope: secret

