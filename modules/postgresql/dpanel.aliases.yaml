version: 1
kind: dpanel-module-aliases

module: postgresql

aliases:
  - input: version
    label: PostgreSQL Version
    help: Select the major PostgreSQL version.
    deprecated_aliases:
      - pg_version

  - input: listen_addresses
    label: Network Bind Addresses
    help: Keep localhost unless the database must accept remote connections.

  - input: admin_password_secret_ref
    label: Admin Password
    help: Select a secret managed by dPanel. The secret value is injected only at execution time.

