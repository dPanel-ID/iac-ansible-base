version: 1
kind: dpanel-module

name: docker
title: Docker
description: Install Docker Engine.
category: runtime
platforms:
  - vm
icon: docker

source:
  backend: ansible
  roles:
    - githubixx.docker
  defaults:
    - ansible/roles/githubixx.docker/defaults/main.yml

supported_os:
  ubuntu:
    - "22.04"
    - "24.04"
  debian:
    - "12"

actions:
  install:
    title: Install Docker
    playbook: playbooks/modules/docker.install.yml
    risk: normal

inputs:
  - name: users
    label: Docker Users
    description: Linux users that should be allowed to run Docker.
    type: string_list
    required: false
    default: []
    maps_to: docker_users
    scope: host

