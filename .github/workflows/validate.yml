name: Validate IaC Template

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ansible:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Ansible
        run: python -m pip install --upgrade ansible

      - name: Install roles and collections
        run: |
          ansible-galaxy install -r requirements.yml -p .ansible/roles
          ansible-galaxy collection install -r requirements.yml -p .ansible/collections

      - name: Prepare role stubs
        run: scripts/prepare-ci-role-stubs.sh

      - name: Validate playbooks
        env:
          ANSIBLE_ROLES_PATH: .ansible/roles
        run: scripts/validate-template.sh
